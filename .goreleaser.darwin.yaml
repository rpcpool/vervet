# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
#
# macOS-only build. Used by release-macos.yml on GitHub-hosted macOS runners.
# Linux builds go through Binaries-ci using .goreleaser.yaml.

version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: vervet
    main: .
    binary: vervet
    env:
      - CGO_ENABLED=1
    ldflags:
      - -s -w
    goos:
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - formats: [binary]
    name_template: vervet-darwin-{{ if eq .Arch "amd64" }}x86_64{{ else }}arm64{{ end }}

changelog:
  sort: asc
  use: github
