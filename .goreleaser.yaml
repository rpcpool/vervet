# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
#
# GCS upload, cosigning, and GitHub Release publishing are injected via
# ci/goreleaser-patch.yaml in Binaries-ci at build time.
#
# Darwin targets are cross-compiled on Linux using zig cc, which bundles its
# own macOS SDK. Wrapper scripts are generated in before.hooks because
# goreleaser env values cannot contain spaces.

version: 2

before:
  hooks:
    - go mod tidy
    - go clean -cache
    - sh -c "rm -rf /tmp/pcsc-macos && cp -r build/pcsc-macos /tmp/pcsc-macos && printf '#!/bin/sh\nexec zig cc -target x86_64-macos -I/tmp/pcsc-macos \"$@\"\n' > /tmp/zcc-darwin-amd64 && chmod +x /tmp/zcc-darwin-amd64"
    - sh -c "printf '#!/bin/sh\nexec zig cc -target aarch64-macos -I/tmp/pcsc-macos \"$@\"\n' > /tmp/zcc-darwin-arm64 && chmod +x /tmp/zcc-darwin-arm64"

builds:
  - id: vervet
    main: .
    binary: vervet
    env:
      - CGO_ENABLED=1
    ldflags:
      - -s -w
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: linux
        goarch: arm64
    overrides:
      - goos: darwin
        goarch: amd64
        env:
          - CGO_ENABLED=1
          - CC=/tmp/zcc-darwin-amd64
      - goos: darwin
        goarch: arm64
        env:
          - CGO_ENABLED=1
          - CC=/tmp/zcc-darwin-arm64

archives:
  - formats: [binary]
    name_template: >-
      vervet-
      {{- .Os }}-
      {{- if eq .Arch "amd64" }}x86_64
      {{- else }}arm64{{ end }}

changelog:
  sort: asc
  use: github
